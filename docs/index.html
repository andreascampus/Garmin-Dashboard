<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Garmin">
  <meta name="theme-color" content="#0f1011">
  <title>Garmin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animierte Hintergrund-Orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app">

    <header class="header">
      <div class="header-left">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="header-title-block">
          <span class="title">GARMIN DASHBOARD</span>
          <span class="header-quote">"Nothing changes if nothing changes."</span>
        </div>
      </div>
      <div class="header-right">
        <span class="header-date" id="header-date">—</span>
        <div class="header-updated">
          <div class="updated-label-row">
            <span class="live-dot"></span>
            <span class="updated-label">Aktualisiert</span>
          </div>
          <span class="updated-time" id="updated-time">—</span>
        </div>
      </div>
    </header>

    <main class="grid" id="grid">

      <!-- ── Recovery ─────────────────────────────────────────────── -->
      <section class="card card-recovery" style="--delay:0.05s">
        <div class="card-top">
          <div class="card-label">RECOVERY</div>
          <div class="time-pills" data-card="recovery">
            <button class="pill active" data-range="today">Heute</button>
            <button class="pill" data-range="7d">7T</button>
            <button class="pill" data-range="30d">30T</button>
          </div>
        </div>
        <div class="card-body" id="recovery-body"></div>
      </section>

      <!-- ── Body Battery ──────────────────────────────────────────── -->
      <section class="card card-battery" style="--delay:0.10s">
        <div class="card-top">
          <div class="card-label">BODY BATTERY</div>
          <div class="time-pills" data-card="battery">
            <button class="pill active" data-range="today">Heute</button>
            <button class="pill" data-range="7d">7T</button>
            <button class="pill" data-range="30d">30T</button>
          </div>
        </div>
        <div class="card-body" id="battery-body"></div>
      </section>

      <!-- ── Schlaf ────────────────────────────────────────────────── -->
      <section class="card card-sleep" style="--delay:0.15s">
        <div class="card-top">
          <div class="card-label">SCHLAF</div>
          <div class="time-pills" data-card="sleep">
            <button class="pill active" data-range="today">Heute</button>
            <button class="pill" data-range="7d">7T</button>
            <button class="pill" data-range="30d">30T</button>
          </div>
        </div>
        <div class="card-body" id="sleep-body"></div>
      </section>

      <!-- ── Schritte ──────────────────────────────────────────────── -->
      <section class="card card-steps" style="--delay:0.20s">
        <div class="card-top">
          <div class="card-label">SCHRITTE</div>
          <div class="time-pills" data-card="steps">
            <button class="pill active" data-range="today">Heute</button>
            <button class="pill" data-range="7d">7T</button>
            <button class="pill" data-range="30d">30T</button>
          </div>
        </div>
        <div class="card-body" id="steps-body"></div>
      </section>

      <!-- ── Stress ────────────────────────────────────────────────── -->
      <section class="card card-stress" style="--delay:0.25s">
        <div class="card-top">
          <div class="card-label">STRESS</div>
          <div class="time-pills" data-card="stress">
            <button class="pill active" data-range="today">Heute</button>
            <button class="pill" data-range="7d">7T</button>
            <button class="pill" data-range="30d">30T</button>
          </div>
        </div>
        <div class="card-body" id="stress-body"></div>
      </section>

      <!-- ── Aktivitäten ───────────────────────────────────────────── -->
      <section class="card card-activity" style="--delay:0.30s">
        <div class="card-top">
          <div class="card-label">AKTIVITÄTEN</div>
          <div class="time-pills" data-card="activity">
            <button class="pill active" data-range="today">Letzte</button>
            <button class="pill" data-range="7d">7T</button>
            <button class="pill" data-range="30d">30T</button>
          </div>
        </div>
        <div class="card-body" id="activity-body"></div>
      </section>

      <!-- ── Fitnessalter ──────────────────────────────────────────── -->
      <section class="card card-fitness-age" style="--delay:0.35s">
        <div class="card-top">
          <div class="card-label">FITNESSALTER</div>
        </div>
        <div class="card-body" id="fitness-age-body"></div>
      </section>

      <!-- ── SpO2 / Blutsauerstoff ───────────────────────────────────── -->
      <section class="card card-spo2" style="--delay:0.45s">
        <div class="card-top">
          <div class="card-label">SPO2 / BLUTSAUERSTOFF</div>
          <div class="time-pills" data-card="spo2">
            <button class="pill active" data-range="today">Heute</button>
            <button class="pill" data-range="7d">7T</button>
          </div>
        </div>
        <div class="card-body" id="spo2-body"></div>
      </section>

      <!-- ── Ruhepuls-Verlauf ─────────────────────────────────────────── -->
      <section class="card card-restinghr" style="--delay:0.50s">
        <div class="card-top">
          <div class="card-label">RUHEPULS</div>
          <div class="time-pills" data-card="restinghr">
            <button class="pill active" data-range="7d">7T</button>
            <button class="pill" data-range="30d">30T</button>
          </div>
        </div>
        <div class="card-body" id="restinghr-body"></div>
      </section>

      <!-- ── Kalorien ─────────────────────────────────────────────────── -->
      <section class="card card-calories" style="--delay:0.55s">
        <div class="card-top">
          <div class="card-label">KALORIEN</div>
          <div class="time-pills" data-card="calories">
            <button class="pill active" data-range="today">Heute</button>
            <button class="pill" data-range="7d">7T</button>
            <button class="pill" data-range="30d">30T</button>
          </div>
        </div>
        <div class="card-body" id="calories-body"></div>
      </section>

      <!-- ── Metabolik (TDEE + FFMI + Metabolisches Alter) ───────────── -->
      <section class="card card-metabolic" style="--delay:0.60s">
        <div class="card-top">
          <div class="card-label">METABOLIK</div>
        </div>
        <div class="card-body" id="metabolic-body"></div>
      </section>

      <!-- ── Körperdaten (Index S2) ────────────────────────────────── -->
      <section class="card card-body-comp" style="--delay:0.65s">
        <div class="card-top">
          <div class="card-label">KÖRPERDATEN</div>
          <div class="time-pills" data-card="bodycomp">
            <button class="pill active" data-range="today">Heute</button>
            <button class="pill" data-range="30d">30T</button>
            <button class="pill" data-range="90d">90T</button>
          </div>
        </div>
        <div class="card-body" id="bodycomp-body"></div>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
